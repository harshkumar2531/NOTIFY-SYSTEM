name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the app image (uses BuildKit cache mounts from the Dockerfile)
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: notif-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test: bring the whole stack up and confirm the app is healthy
      - name: Start stack and smoke test
        run: |
          docker compose up -d --build
          # wait for the app healthcheck to go healthy (up to ~60s)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then echo "OK"; exit 0; fi
            sleep 2
          done
          echo "App did not become healthy"; docker compose logs; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v