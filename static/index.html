<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Realtime Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- No build step. MQTT.js browser bundle from CDN. -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f4f7fb;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #ccd5e1;
      font-size: 15px;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
    }

    button.primary {
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.danger {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f1f5f9;
      font-size: 14px;
    }

    .status.connected {
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: white;
      border-left: 6px solid #2563eb;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
      animation: slideIn 0.2s ease-out;
    }

    .card.success {
      border-left-color: #22c55e;
    }

    .card.warning {
      border-left-color: #f59e0b;
    }

    .card.error {
      border-left-color: #ef4444;
    }

    .card-title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-message {
      color: #334155;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .card-meta {
      color: #64748b;
      font-size: 12px;
    }

    .empty {
      color: #64748b;
      text-align: center;
      padding: 28px;
      background: white;
      border-radius: 14px;
    }

    .toast-area {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: grid;
      gap: 12px;
      z-index: 9999;
      max-width: 360px;
    }

    .toast {
      background: #172033;
      color: white;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Realtime Notifications</h1>

      <p>
        This page connects to VerneMQ over WebSocket at
        <code>ws://localhost:8080/mqtt</code> and subscribes to:
      </p>

      <p>
        <code>users/{user_id}/notifications</code>
      </p>

      <label for="userId">User ID</label>
      <input id="userId" placeholder="Example: 123" value="123" />

      <label for="brokerUrl">MQTT WebSocket URL</label>
      <input id="brokerUrl" value="ws://localhost:8080/mqtt" />

      <button class="primary" onclick="connectMqtt()">Connect</button>
      <button class="danger" onclick="disconnectMqtt()">Disconnect</button>
      <button class="secondary" onclick="clearNotifications()">Clear</button>

      <div id="status" class="status">Disconnected</div>
    </div>

    <div id="notificationList" class="cards">
      <div class="empty">No notifications yet.</div>
    </div>
  </div>

  <div id="toastArea" class="toast-area"></div>

  <script>
    let client = null;
    let currentTopic = null;

    const statusEl = document.getElementById("status");
    const notificationList = document.getElementById("notificationList");
    const toastArea = document.getElementById("toastArea");

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status";

      if (type === "connected") {
        statusEl.classList.add("connected");
      }

      if (type === "error") {
        statusEl.classList.add("error");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeNotification(payloadText) {
      try {
        const data = JSON.parse(payloadText);

        return {
          title: data.title || data.subject || "New notification",
          message: data.message || data.body || JSON.stringify(data, null, 2),
          type: data.type || data.level || "info",
          raw: data
        };
      } catch {
        return {
          title: "New notification",
          message: payloadText,
          type: "info",
          raw: payloadText
        };
      }
    }

    function addNotificationCard(topic, payloadText) {
      const notification = normalizeNotification(payloadText);
      const time = new Date().toLocaleString();

      const empty = notificationList.querySelector(".empty");
      if (empty) {
        empty.remove();
      }

      const card = document.createElement("div");
      card.className = `card ${escapeHtml(notification.type)}`;

      card.innerHTML = `
        <div class="card-title">${escapeHtml(notification.title)}</div>
        <div class="card-message">${escapeHtml(notification.message)}</div>
        <div class="card-meta">
          Topic: ${escapeHtml(topic)} · Received: ${escapeHtml(time)}
        </div>
      `;

      notificationList.prepend(card);
      showToast(notification.title, notification.message);
    }

    function showToast(title, message) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = `
        <strong>${escapeHtml(title)}</strong>
        <div>${escapeHtml(message)}</div>
      `;

      toastArea.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 5000);
    }

    function connectMqtt() {
      const userId = document.getElementById("userId").value.trim();
      const brokerUrl = document.getElementById("brokerUrl").value.trim();

      if (!userId) {
        alert("Please enter a user ID.");
        return;
      }

      if (!brokerUrl) {
        alert("Please enter the MQTT WebSocket URL.");
        return;
      }

      if (client) {
        disconnectMqtt();
      }

      currentTopic = `users/${userId}/notifications`;

      const clientId = `browser_notifications_${userId}_${Math.random().toString(16).slice(2)}`;

      setStatus(`Connecting to ${brokerUrl} ...`);

      client = mqtt.connect(brokerUrl, {
        clientId,
        clean: true,
        connectTimeout: 5000,
        reconnectPeriod: 2000,
        keepalive: 30
      });

      client.on("connect", () => {
        setStatus(`Connected. Subscribing to ${currentTopic}`, "connected");

        client.subscribe(currentTopic, { qos: 0 }, (err) => {
          if (err) {
            setStatus(`Subscribe failed: ${err.message}`, "error");
            return;
          }

          setStatus(`Connected and subscribed to ${currentTopic}`, "connected");
        });
      });

      client.on("message", (topic, payload) => {
        const payloadText = payload.toString();
        addNotificationCard(topic, payloadText);
      });

      client.on("reconnect", () => {
        setStatus("Reconnecting...");
      });

      client.on("close", () => {
        setStatus("Connection closed.");
      });

      client.on("error", (err) => {
        setStatus(`MQTT error: ${err.message}`, "error");
        console.error(err);
      });
    }

    function disconnectMqtt() {
      if (client) {
        client.end(true);
        client = null;
      }

      setStatus("Disconnected");
    }

    function clearNotifications() {
      notificationList.innerHTML = '<div class="empty">No notifications yet.</div>';
      toastArea.innerHTML = "";
    }
  </script>
</body>
</html>
