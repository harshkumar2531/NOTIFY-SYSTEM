<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Notifications Dashboard</title>
  
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  
  <style>
    :root { 
      --bg: #0f172a; 
      --card: #1e293b; 
      --accent: #38bdf8; 
      --accent-hover: #0ea5e9;
      --text: #e2e8f0; 
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0; 
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh;
    }
    
    header {
      padding: 16px 24px; 
      background: #020617; 
      display: flex; 
      flex-wrap: wrap;
      gap: 12px; 
      align-items: center; 
      border-bottom: 1px solid #334155;
    }
    
    header h1 { font-size: 18px; margin: 0; margin-right: auto; }
    
    input {
      font-size: 14px; 
      padding: 8px 12px; 
      border-radius: 8px; 
      border: 1px solid #334155;
      background: #0f172a; 
      color: var(--text);
    }
    
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    button { 
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600; 
      cursor: pointer; 
      border: none; 
      transition: background 0.2s ease;
    }
    
    button.primary { background: var(--accent); color: #04263a; }
    button.primary:hover { background: var(--accent-hover); }
    
    button.danger { background: var(--danger); color: white; }
    button.danger:hover { background: var(--danger-hover); }
    
    button.secondary { background: #334155; color: var(--text); }
    button.secondary:hover { background: #475569; }
    
    #status { font-size: 13px; padding: 6px 12px; border-radius: 999px; background: #334155; font-weight: 500; }
    #status.connected { background: #166534; color: #dcfce7; }
    #status.disconnected { background: #7f1d1d; color: #fee2e2; }
    #status.connecting { background: #854d0e; color: #fef9c3; }
    
    main { padding: 24px; max-width: 720px; margin: 0 auto; }
    
    .controls-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    
    .empty { opacity: .6; text-align: center; margin-top: 40px; }
    
    .cards-container { display: grid; gap: 12px; }
    
    .card {
      background: var(--card); 
      border: 1px solid #334155; 
      border-left: 4px solid var(--accent);
      border-radius: 10px; 
      padding: 14px 16px; 
      animation: pop .25s ease;
    }
    
    .card .title { font-weight: 700; margin-bottom: 4px; }
    .card .body { font-size: 14px; opacity: .9; white-space: pre-wrap; word-break: break-word; }
    .card .meta { font-size: 11px; opacity: .55; margin-top: 8px; }
    
    @keyframes pop { 
      from { opacity: 0; transform: translateY(-8px); } 
      to { opacity: 1; transform: none; } 
    }
  </style>
</head>
<body>

  <header>
    <h1>Live Notifications</h1>
    <input id="userId" placeholder="User ID" value="user123" />
    <input id="mqttToken" placeholder="MQTT token (optional)" style="min-width: 220px" type="password" />
    <button id="connectBtn" class="primary">Connect</button>
    <button id="disconnectBtn" class="danger" style="display: none;">Disconnect</button>
    <span id="status" class="disconnected">disconnected</span>
  </header>

  <main>
    <div class="controls-row">
      <button id="clearBtn" class="secondary">Clear Dashboard</button>
    </div>
    
    <div id="notifications">
      <p class="empty">No notifications yet. Connect and wait for messages…</p>
    </div>
  </main>

  <script>
    // VerneMQ default WebSocket endpoint configuration
    const BROKER_URL = "ws://localhost:8080/mqtt";

    const statusEl = document.getElementById("status");
    const listEl = document.getElementById("notifications");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const clearBtn = document.getElementById("clearBtn");
    const userInput = document.getElementById("userId");
    const tokenInput = document.getElementById("mqttToken");

    let client = null;

    function setStatus(text, stateClass) {
      statusEl.textContent = text;
      statusEl.className = stateClass; // 'connected', 'disconnected', or 'connecting'
      
      if (stateClass === 'connected') {
        connectBtn.style.display = "none";
        disconnectBtn.style.display = "inline-block";
      } else if (stateClass === 'disconnected') {
        connectBtn.style.display = "inline-block";
        disconnectBtn.style.display = "none";
      }
    }

    // Secure DOM manipulation prevents XSS attacks from unknown raw text inputs
    function addCard(title, body) {
      const empty = listEl.querySelector(".empty");
      if (empty) empty.remove();

      const card = document.createElement("div");
      card.className = "card";

      const t = document.createElement("div"); 
      t.className = "title"; 
      t.textContent = title || "Notification";
      
      const b = document.createElement("div"); 
      b.className = "body"; 
      b.textContent = body || "";
      
      const m = document.createElement("div"); 
      m.className = "meta"; 
      m.textContent = `Received: ${new Date().toLocaleTimeString()}`;

      card.append(t, b, m);
      listEl.prepend(card);
    }

    function connect() {
      const userId = userInput.value.trim();
      if (!userId) { 
        alert("Please enter a User ID"); 
        return; 
      }

      if (client) { 
        disconnect();
      }

      setStatus("connecting…", "connecting");
      
      const topic = `users/${userId}/notifications`;
      // Keeps Client ID dynamic to avoid instant disconnect loops on the broker
      const clientId = `web_${userId}_${Math.random().toString(16).slice(2, 8)}`;
      const token = tokenInput.value.trim();

      const opts = { 
        clientId, 
        clean: true, 
        reconnectPeriod: 4000, 
        connectTimeout: 8000 
      };

      // Apply authentication credentials if security token is provided
      if (token) { 
        opts.username = userId; 
        opts.password = token; 
      }

      client = mqtt.connect(BROKER_URL, opts);

      client.on("connect", () => {
        setStatus("connected", "connected");
        client.subscribe(topic, { qos: 1 }, (err) => {
          if (err) {
            setStatus("subscribe failed", "disconnected");
          } else {
            addCard("System System Status", `Successfully listening on: ${topic}`);
          }
        });
      });

      client.on("message", (recvTopic, payload) => {
        const raw = payload.toString();
        let title, body;
        
        try {
          // Attempt to parse incoming valid JSON structures from server
          const data = JSON.parse(raw);
          title = data.title || data.type || data.subject || "Notification";
          body = data.body || data.message || JSON.stringify(data, null, 2);
        } catch {
          // Fall back to plain-text string formatting if parsing fails
          title = "Notification";
          body = raw;
        }
        
        addCard(title, body);
      });

      client.on("reconnect", () => setStatus("reconnecting…", "connecting"));
      client.on("close", () => setStatus("disconnected", "disconnected"));
      client.on("error", (e) => { 
        console.error(e); 
        setStatus(`error: ${e.message}`, "disconnected"); 
      });
    }

    function disconnect() {
      if (client) {
        try {
          client.end(true); 
        } catch (e) {
          console.error("Error during manual close:", e);
        }
        client = null;
      }
      setStatus("disconnected", "disconnected");
    }

    function clearDashboard() {
      listEl.innerHTML = '<p class="empty">No notifications yet. Connect and wait for messages…</p>';
    }

    // Attach Event Listeners
    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    clearBtn.addEventListener("click", clearDashboard);
  </script>
</body>
</html>
